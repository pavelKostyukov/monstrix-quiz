        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Magnitus', sans-serif;
            background: linear-gradient(135deg, #FFE135 0%, #FFD700 50%, #4ECDC4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: rgba(78, 205, 196, 0.15);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            animation: float 25s ease-in-out infinite;
            filter: blur(60px);
        }

        body::after {
            content: '';
            position: fixed;
            width: 350px;
            height: 350px;
            background: rgba(255, 225, 53, 0.2);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            animation: float 20s ease-in-out infinite reverse;
            filter: blur(60px);
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 100px) scale(1.2); }
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
            z-index: 1;
            border: 4px solid #FFE135;
        }

        .header {
            background: linear-gradient(135deg, #FFE135 0%, #FFD700 100%);
            padding: 35px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(78, 205, 196, 0.2) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .logo-magnit {
            background: #E30613;
            color: white;
            font-family: 'Magnitus', sans-serif;
            font-weight: 900;
            font-size: 1.2em;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .logo-text {
            font-family: 'Magnitus', sans-serif;
            font-weight: 900;
            font-size: 3em;
            color: #FF0000;
            margin-bottom: 10px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            text-shadow: 
                3px 3px 0px rgba(0,0,0,0.1);
            line-height: 1.1;
        }

        .header h1 {
            font-family: 'Magnitus', sans-serif;
            font-size: 1.8em;
            font-weight: 900;
            color: #2D1B2E;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .header p {
            color: #2D1B2E;
            font-size: 1em;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .progress-container {
            background: #FFF9E6;
            height: 12px;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, #FFE135 0%, #4ECDC4 100%);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            border: 4px solid #4ECDC4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .content {
            padding: 40px 35px;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: slideInRight 0.4s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #FFE135, #FFD700);
            color: #2D1B2E;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 225, 53, 0.4);
            border: 2px solid #FFD700;
        }

        .question-text {
            font-family: 'Magnitus', sans-serif;
            font-size: 1.65em;
            font-weight: 700;
            color: #2D1B2E;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: white;
            border: 3px solid #E0E0E0;
            border-radius: 20px;
            padding: 18px 22px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.05em;
            font-weight: 600;
            color: #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 225, 53, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .option:hover {
            border-color: #FFE135;
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 225, 53, 0.3);
            background: #FFFEF5;
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            background: linear-gradient(135deg, #FFE135 0%, #FFD700 100%);
            border-color: #FFD700;
            color: #2D1B2E;
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(255, 225, 53, 0.5);
        }

        .option-emoji {
            font-size: 1.3em;
            margin-right: 10px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .option:hover .option-emoji {
            transform: scale(1.2) rotate(5deg);
        }

        .option.selected .option-emoji {
            transform: scale(1.3) rotate(10deg);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
            gap: 15px;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Magnitus', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-prev {
            background: #F5F5F5;
            color: #666;
            border: 3px solid #E0E0E0;
        }

        .btn-prev:hover:not(:disabled) {
            background: #E8E8E8;
            transform: translateX(-5px);
        }

        .btn-next {
            background: linear-gradient(135deg, #FFE135 0%, #FFD700 100%);
            color: #2D1B2E;
            flex: 1;
            box-shadow: 0 6px 20px rgba(255, 225, 53, 0.4);
            border: 3px solid #FFD700;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 225, 53, 0.6);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-container {
            display: none;
            text-align: center;
        }

        .result-container.active {
            display: block;
            animation: zoomIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .monster-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 25px;
            position: relative;
        }

        .monster-svg {
            width: 100%;
            height: 100%;
        }

        .result-title {
            font-family: 'Magnitus', sans-serif;
            font-size: 2.8em;
            font-weight: 900;
            background: linear-gradient(135deg, #FFE135, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .result-subtitle {
            font-size: 1.3em;
            color: #666;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .result-description {
            font-size: 1.1em;
            line-height: 1.8;
            color: #555;
            margin-bottom: 30px;
            text-align: left;
            background: #FFFEF5;
            padding: 25px;
            border-radius: 20px;
            border-left: 5px solid #FFE135;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .result-card {
            background: linear-gradient(135deg, #FFFEF5 0%, #F0FFF9 100%);
            border-radius: 25px;
            padding: 30px;
            margin: 25px 0;
            border: 3px solid #FFE135;

                spokish: {
                    title: "Спокиш",
                    subtitle: "Спокойствие",
                    monster: "spokish",
                    description: "Вы — про баланс и устойчивость.\nВ ситуациях, где другие начинают суетиться, вы сохраняете ровный ритм.\nС вами спокойно работать, вы создаёте ощущение надёжности и стабильности.\nВаш стиль — внутренняя сила без лишнего шума."
                },
                boss: {
                    title: "Босс",
                    subtitle: "Драйв и результат",
                    monster: "boss",
                    description: "Вы ориентированы на цель.\nВам важно понимать, что происходит и куда вы двигаетесь.\nВы берёте ответственность и доводите дела до конца.\nКогда вы включены — процесс становится чётким и управляемым."
                },
                otpadik: {
                    title: "Отпадик",
                    subtitle: "Энергия и Вау",
                    monster: "otpadik",
                    description: "Вы заряжаете атмосферу.\nВам нравится динамика, движение и ощущение новизны.\nС вами живо, ярко и интересно.\nВы легко включаете других и создаёте эмоциональный подъём."
                },
                krashik: {
                    title: "Крашик",
                    subtitle: "Тепло и поддержка",
                    monster: "krashik",
                    description: "Вы тонко чувствуете людей.\nЗамечаете настроение окружающих и умеете поддержать.\nВаша сила — в искренности и внимательности.\nС вами по-настоящему комфортно и по-человечески."
                },
                ups: {
                    title: "Упс",
                    subtitle: "Импульс и неожиданность",
                    monster: "ups",
                    description: "Вы реагируете быстро и живо.\nЛегко адаптируетесь к переменам и не боитесь поворотов.\nВ вас есть элемент спонтанности, который делает вас интересным.\nС вами точно не бывает скучно."
                }
            }
        };

        let currentQuestion = 0;
        let answers = { spokish: 0, boss: 0, otpadik: 0, krashik: 0, ups: 0 };
        let lastAnswer = null;

        function renderQuestion() {
            const quizContent = document.getElementById('quizContent');
            const question = quizData.questions[currentQuestion];
            
            quizContent.innerHTML = `
                <div class="question-container active">
                    <div class="question-number">Вопрос ${currentQuestion + 1} из ${quizData.questions.length}</div>
                    <div class="question-text">${question.question}</div>
                    <div class="options">
                        ${question.options.map(option => `
                            <div class="option" data-type="${option.type}" onclick="selectOption(this)">
                                <span class="option-emoji">${option.emoji}</span>
                                ${option.text}
                            </div>
                        `).join('')}
                    </div>
                    <div class="navigation">
                        <button class="btn btn-prev" onclick="prevQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>
                            ← Назад
                        </button>
                        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
                            ${currentQuestion === quizData.questions.length - 1 ? '🎯 Узнать результат!' : 'Далее →'}
                        </button>
                    </div>
                </div>
            `;
            updateProgress();
        }

        function selectOption(element) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            const selected = document.querySelector('.option.selected');
            if (!selected) return;

            const type = selected.getAttribute('data-type');
            answers[type]++;
            lastAnswer = type;

            if (currentQuestion < quizData.questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizData.questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function showResult() {
            let maxScore = 0;
            let resultType = 'spokish';
            
            for (let type in answers) {
                if (answers[type] > maxScore) {
                    maxScore = answers[type];
                    resultType = type;
                }
            }

            const tieTypes = Object.keys(answers).filter(type => answers[type] === maxScore);
            if (tieTypes.length > 1 && lastAnswer) {
                resultType = lastAnswer;
            }

            const result = quizData.results[resultType];
            
            document.getElementById('quizContent').style.display = 'none';
            const resultContent = document.getElementById('resultContent');
            
            resultContent.innerHTML = `
                <div class="result-container active">
                    <div class="monster-container">
                        ${monsters[result.monster]}
                    </div>
                    <h2 class="result-title">Вы — ${result.title}!</h2>
                    <p class="result-subtitle">${result.subtitle}</p>
                    
                    <div class="result-card">
                        <div class="result-description">${result.description.replace(/\n/g, '<br>')}</div>
                    </div>

                    <p style="color: #999; font-size: 0.95em; margin: 20px 0; font-weight: 600;">
                        📱 Покажите этот экран координатору<br>для участия в лотерее <strong style="color: #FFD700;">«Монстрикс-Шанс»</strong>! 🎁
                    </p>
                    
                    <button class="btn btn-restart" onclick="restartQuiz()">
                        🔄 Пройти ещё раз
                    </button>
                </div>
            `;
            
            document.getElementById('progressBar').style.width = '100%';
            createConfetti();
        }

        function restartQuiz() {
            currentQuestion = 0;
            answers = { spokish: 0, boss: 0, otpadik: 0, krashik: 0, ups: 0 };
            lastAnswer = null;
            
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('resultContent').innerHTML = '';
            renderQuestion();
        }

        function createConfetti() {
            const colors = ['#FFE135', '#FFD700', '#4ECDC4', '#FF88C2', '#A78BFA', '#00FF7F'];
            for (let i = 0; i < 70; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    confetti.style.width = (Math.random() * 10 + 8) + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 5000);
                }, i * 25);
            }
        }

        renderQuestion();
    </script>
</body>
</html>
